services:
    dbhost:
      image: quanticschoolofbusiness/103mysql
    app:
      build: app/.
      ports: 
        - 3006:3006
      depends_on:
        - dbhost
        - redis-server
      environment:
        FOLDER_PATH: /mnt/watchfolder/
        DB_NAME: allergen_info
        DB_USER: pythonapp 
        DB_PASS: secretPass123!
    redis-server:
      image: redis
    email:
      build: email/.
      ports: 
        - 25:25
      depends_on:
        - redis-server
      environment:
        TO_ADDRESS: ka82@students.quantic.edu
        FROM_ADDRESS: adedipebabatundekolapo@gmail.com
        FROM_PASSWORD: rjzmditczxpuzdrj
    db-loader:
      build: db-loader/.
      volumes: 
        - C:/Users/user/Desktop/allergy-lab-watchfolder:/mnt/watchfolder/
      environment:
        FOLDER_PATH: /mnt/watchfolder/
        DB_NAME: allergen_info
        DB_USER: pythonapp 
        DB_PASS: secretPass123!
      depends_on:
        - dbhost